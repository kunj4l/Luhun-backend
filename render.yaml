services:
  - type: web
    name: luhun-backend
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://luhun.netlify.app
      - key: LUHUN_CATALOG_DIR
        value: ./catalog
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
